<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вы не в сети — ENT Prep AI</title>
    <style>
        :root {
            --primary: #2563eb;
            --accent: #8b5cf6;
            --bg: #f4f6fb;
            --text: #0f172a;
            --text-secondary: #64748b;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            padding: 2rem;
            max-width: 400px;
        }
        .icon {
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2);
        }
        svg {
            width: 48px;
            height: 48px;
            color: white;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 800;
        }
        p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 4.978 4.978 0 011.414-3.536m-1.414 3.536L4 21M8.464 8.464a5 5 0 017.072 0" />
            </svg>
        </div>
        <h1>Вы не в сети</h1>
        <p>Похоже, у вас пропало соединение с интернетом. Пожалуйста, проверьте сеть и попробуйте обновить страницу.</p>
        <button onclick="window.location.reload()">Обновить страницу</button>
    </div>
</body>
</html>
